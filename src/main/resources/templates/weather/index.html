<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather - Naver Style</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/weather.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="weather-shell">
    <!-- 상단: 위치 및 검색 -->
    <div class="weather-topbar">
        <div class="location-info">
            <h1 class="current-location" th:text="${selectedCity}">서울</h1>
            <span class="update-time" th:text="${weather.currentDateTime + ' 업데이트'}">3월 31일 14:00 업데이트</span>
        </div>
        <form class="search-form" method="get" th:action="@{/weather}">
            <div class="search-box">
                <input name="city" type="text" th:value="${selectedCity}" placeholder="지역을 입력하세요">
                <button type="submit"><i class="search-icon">🔍</i></button>
            </div>
        </form>
    </div>

    <section class="weather-main-panel" th:if="${weather}">
        <!-- 현재 날씨 섹션 -->
        <div class="weather-now-container">
            <div class="weather-now-main centered">
                <div class="now-visual">
                    <img class="now-icon" th:src="${weather.currentIconUrl}" alt="weather icon">
                    <div class="now-temp-wrap">
                        <span class="now-temp" th:text="${weather.currentTemp}">10°</span>
                        <span class="now-condition" th:text="${weather.currentDescription}">맑음</span>
                    </div>
                </div>
                <div class="now-summary-new">
                    <div class="temp-detail-row">
                        <div class="temp-item">
                            <span class="t-label">체감</span>
                            <span class="t-value" th:text="${weather.feelsLike}">9°</span>
                        </div>
                        <div class="t-divider"></div>
                        <div class="temp-item">
                            <span class="t-label">최고</span>
                            <span class="t-value" th:text="${weather.highTemp}">15°</span>
                        </div>
                        <div class="t-divider"></div>
                        <div class="temp-item">
                            <span class="t-label">최저</span>
                            <span class="t-value" th:text="${weather.lowTemp}">5°</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="weather-now-details">
                <div class="detail-grid">
                    <!-- 1행: 습도 및 강수확률 -->
                    <div class="detail-box metric-box inline-box">
                        <div class="metric-content">
                            <span class="metric-icon">💧</span>
                            <span class="label">습도</span>
                            <span class="value main-value" th:text="${weather.humidity}">50%</span>
                        </div>
                    </div>
                    <div class="detail-box metric-box inline-box">
                        <div class="metric-content">
                            <span class="metric-icon">☔</span>
                            <span class="label">강수확률</span>
                            <span class="value main-value" th:text="${weather.rainProbability}">10%</span>
                        </div>
                    </div>

                    <!-- 2행: 대기질 정보 (미세먼지 + 초미세먼지 통합 박스) -->
                    <div class="detail-box">
                        <div class="aqi-rows">
                            <div class="aqi-row hover-trigger">
                                <span class="aqi-label">미세먼지</span>
                                <div class="status-wrap">
                                    <span th:class="|status-badge aqi-${weather.aqiGrade}|" th:text="${weather.aqiGrade}">보통</span>
                                    <span class="value hover-value" th:text="${weather.pm10}">35㎍/㎥</span>
                                </div>
                            </div>
                            <div class="aqi-row hover-trigger">
                                <span class="aqi-label">초미세먼지</span>
                                <div class="status-wrap">
                                    <span th:class="|status-badge aqi-${weather.aqiGrade}|" th:text="${weather.aqiGrade}">보통</span>
                                    <span class="value hover-value" th:text="${weather.pm25}">18㎍/㎥</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 3행: 일출 / 일몰 (통합 박스) -->
                    <div class="detail-box">
                        <div class="sun-rows">
                            <div class="sun-row">
                                <span class="sun-label">🌅 일출</span>
                                <span class="value" th:text="${weather.sunrise}">06:12</span>
                            </div>
                            <div class="sun-row">
                                <span class="sun-label">🌇 일몰</span>
                                <span class="value" th:text="${weather.sunset}">18:45</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 시간별 예보 슬라이더 -->
        <div class="weather-forecast-section">
            <h3 class="section-title">시간별 예보 <small>(3일간)</small></h3>
            <div class="forecast-slider-wrap">
                <div class="forecast-grid draggable">
                    <article class="forecast-card" th:each="item : ${weather.hourlyForecast}">
                        <div class="temp-bar-wrap">
                            <div th:class="'temp-fill ' + ${item.tempClass}" th:style="'height:' + ${item.tempPercent} + '%;'"></div>
                        </div>
                        <b class="f-date" th:text="${item.dayLabel}">오늘</b>
                        <span class="f-time" th:text="${item.timeLabel}">15:00</span>
                        <img class="f-icon" th:src="${item.iconUrl}" alt="icon">
                        <strong class="f-temp" th:text="${item.temperature}">11°</strong>
                        <span class="f-pop" th:text="${item.rainProbability}">10%</span>
                    </article>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const slider = document.querySelector('.draggable');
    let isDown = false, startX, scrollLeft;
    slider.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', (e) => e.preventDefault()));
    slider.addEventListener('mousedown', (e) => {
        isDown = true; slider.classList.add('grabbing');
        startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
        slider.style.scrollBehavior = 'auto';
    });
    const endDrag = () => { isDown = false; slider.classList.remove('grabbing'); };
    slider.addEventListener('mouseleave', endDrag);
    slider.addEventListener('mouseup', endDrag);
    slider.addEventListener('mousemove', (e) => {
        if (!isDown) return; e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        const walk = (x - startX) * 2.5; slider.scrollLeft = scrollLeft - walk;
    });
</script>
</body>
</html>
